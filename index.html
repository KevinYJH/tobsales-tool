<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ToB销售行业适配度评估</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
:root {
  --bg1:#f8f3ff;
  --bg2:#eef4ff;
  --ink:#182235;
  --sub:#69758a;
  --line:#eadff7;
  --card:rgba(255,255,255,.9);
  --white:#fff;
  --pri:#7b61ff;
  --pri2:#b56bff;
  --pink:#ff5f94;
  --soft:#f5f7ff;
  --good:#22c55e;
  --better:#3b82f6;
  --mid:#f59e0b;
  --warn:#fb7185;
  --shadow:0 18px 44px rgba(114,92,255,.13);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 0% 0%, rgba(255,255,255,.95), transparent 22%),
    radial-gradient(circle at 100% 0%, rgba(255,112,160,.16), transparent 18%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 58%, #fff8fb);
  min-height:100vh;
  padding:14px;
}
.shell {
  max-width:760px;
  margin:0 auto;
  background:var(--card);
  border:1px solid rgba(255,255,255,.85);
  border-radius:28px;
  box-shadow:var(--shadow);
  overflow:hidden;
  backdrop-filter:blur(18px);
}
.topbar {
  padding:26px 20px 8px;
  background:linear-gradient(180deg, rgba(255,255,255,.32), rgba(255,255,255,.1));
}
.eyebrow {
  display:flex; align-items:center; gap:12px;
  font-size:1.1rem; font-weight:800; color:#384457;
}
.dot {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,var(--pri),var(--pink));
  box-shadow:0 10px 20px rgba(124,98,255,.25);
}
.hero-title {
  margin:18px 0 10px;
  font-size:clamp(2.15rem, 6vw, 3.1rem);
  line-height:1.04; font-weight:950; letter-spacing:-1px;
  max-width:11em;
}
.hero-sub {
  margin:0;
  color:var(--sub);
  font-size:1rem;
  line-height:1.8;
}
.content { padding:18px 20px 24px; }
.page { display:none; }
.page.active { display:block; }
.panel {
  background:rgba(255,255,255,.76);
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px 16px;
  margin-bottom:14px;
  box-shadow:0 6px 18px rgba(122,92,255,.05);
}
.panel-title {
  font-size:1.4rem; font-weight:900; margin-bottom:8px;
}
.panel-sub {
  font-size:1rem; line-height:1.8; color:var(--sub); margin:0;
}
.field-label {
  display:block; font-size:1.05rem; font-weight:800; margin:6px 0 12px;
}
.input {
  width:100%; border:2px solid #ddd8ff; background:#fff;
  border-radius:20px; height:58px; font-size:1.12rem; padding:0 18px;
  outline:none; color:var(--ink); font-weight:700;
  transition:.2s;
}
.input:focus {
  border-color:var(--pri);
  box-shadow:0 0 0 6px rgba(123,97,255,.12);
}
.primary-btn,.ghost-btn {
  width:100%; border:none; border-radius:999px; height:58px;
  font-size:1.18rem; font-weight:900; cursor:pointer;
  transition:.22s ease;
}
.primary-btn {
  color:#fff;
  background:linear-gradient(90deg,var(--pri),var(--pink));
  box-shadow:0 16px 26px rgba(255,95,148,.23);
}
.primary-btn:active,.ghost-btn:active { transform:scale(.99); }
.ghost-btn {
  background:#fff; color:var(--pri); border:2px solid #e1d8ff;
}
.mini-note {
  margin-top:12px; font-size:.9rem; color:#8793a8; line-height:1.7;
}
.progress-wrap {
  position:sticky; top:10px; z-index:8;
  background:rgba(255,255,255,.86);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  margin-bottom:14px;
  backdrop-filter:blur(12px);
}
.progress-row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
.progress-row strong { font-size:1rem; }
.progress-row span { color:var(--sub); font-weight:800; }
.track {
  height:10px; background:#efe9ff; border-radius:999px; overflow:hidden;
}
.bar {
  width:0%; height:100%;
  background:linear-gradient(90deg,var(--pri),var(--pink));
  border-radius:999px; transition:width .25s ease;
}
.module-hero {
  padding:12px 4px 6px;
  text-align:left;
}
.module-kicker {
  font-size:.92rem; color:var(--pri); font-weight:900; letter-spacing:.5px;
}
.module-title {
  margin:10px 0 8px; font-size:2.05rem; font-weight:950; line-height:1.08;
}
.module-sub {
  color:var(--sub); line-height:1.8; font-size:.98rem;
}
.module-anim {
  animation:moduleIn .45s cubic-bezier(.22,.85,.2,1);
  transform-origin:left center;
}
@keyframes moduleIn {
  from { opacity:0; transform:translateY(14px) scale(.98); filter:blur(5px); }
  to { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}
.q-card {
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px 16px;
  margin-bottom:14px;
  box-shadow:0 8px 22px rgba(123,97,255,.05);
}
.q-num {
  color:var(--pri); font-size:1rem; font-weight:900; margin-bottom:10px;
}
.q-text {
  font-size:1.08rem; line-height:1.7; font-weight:900; margin-bottom:16px;
}
.scale {
  display:grid; grid-template-columns:58px 1fr 58px; align-items:center; gap:8px;
}
.scale span {
  color:#9aa4b8; font-size:.92rem; font-weight:800;
}
.scale span:last-child { text-align:right; }
.opts {
  display:flex; justify-content:center; gap:10px;
}
.opts button {
  width:46px; height:46px; border-radius:50%;
  border:none; background:#f3f4fb; color:#596579;
  font-size:1.08rem; font-weight:900; cursor:pointer; transition:.18s ease;
}
.opts button.on {
  color:#fff; transform:translateY(-2px) scale(1.05);
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  box-shadow:0 12px 18px rgba(123,97,255,.28);
}
.nav-row {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;
}
.result-head {
  background:linear-gradient(135deg, rgba(123,97,255,.12), rgba(255,95,148,.09));
  border:1px solid var(--line);
  border-radius:26px; padding:20px 18px; margin-bottom:16px;
}
.result-name { font-size:1.08rem; color:var(--sub); font-weight:800; }
.result-title { font-size:2rem; font-weight:950; line-height:1.1; margin:8px 0 0; }
.top-industry {
  display:inline-flex; align-items:center; gap:8px;
  margin-top:12px; background:#fff; border:1px solid #ebe4ff;
  border-radius:999px; padding:10px 14px; font-weight:900;
}
.summary-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:14px 0 18px;
}
.stat-card {
  background:#fff; border:1px solid var(--line); border-radius:20px; padding:14px 12px;
}
.stat-label { color:var(--sub); font-size:.9rem; font-weight:800; margin-bottom:6px; }
.stat-value { font-size:1.36rem; font-weight:950; }
.result-card {
  border-radius:26px; border:2px solid; overflow:hidden; margin-bottom:14px;
  box-shadow:0 10px 26px rgba(0,0,0,.04);
  background:#fff;
}
.zone-head {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:16px 16px 14px;
}
.zone-title { font-size:1.32rem; font-weight:950; }
.badge {
  white-space:nowrap; border-radius:999px; padding:8px 12px; font-size:.88rem; font-weight:900;
  background:#fff; box-shadow:0 6px 14px rgba(0,0,0,.05);
}
.zone-good { border-color:#98e5b4; background:linear-gradient(180deg, rgba(220,252,231,.88), rgba(255,255,255,.98) 46%); }
.zone-good .badge { color:var(--good); }
.zone-blue { border-color:#a9d0ff; background:linear-gradient(180deg, rgba(219,234,254,.92), rgba(255,255,255,.98) 46%); }
.zone-blue .badge { color:var(--better); }
.zone-mid { border-color:#ffd58a; background:linear-gradient(180deg, rgba(255,248,220,.95), rgba(255,255,255,.98) 46%); }
.zone-mid .badge { color:var(--mid); }
.zone-warn { border-color:#ffc0cf; background:linear-gradient(180deg, rgba(255,228,235,.95), rgba(255,255,255,.98) 46%); }
.zone-warn .badge { color:var(--warn); }
.card-body { padding:0 16px 16px; }
.big-score { font-size:2rem; font-weight:950; margin:4px 0 0; }
.chart-wrap {
  position:relative; height:280px; border:1px dashed #ddd8ff; border-radius:22px;
  background:linear-gradient(180deg,#fff, #faf8ff); padding:12px; margin:14px 0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
.chart-wrap::before {
  content:''; position:absolute; inset:0; pointer-events:none; border-radius:22px;
  background:linear-gradient(135deg, rgba(123,97,255,.05), rgba(255,95,148,.03) 40%, transparent 75%);
}
.info {
  margin-top:12px; display:grid; gap:10px;
}
.info-block {
  border:1px solid var(--line); border-radius:20px; padding:14px 14px 13px; background:linear-gradient(180deg,#ffffff, #fbf9ff);
  box-shadow:0 8px 18px rgba(123,97,255,.04);
}
.info-block b { display:inline-block; margin-bottom:8px; font-size:.96rem; padding:6px 10px; border-radius:12px; background:linear-gradient(135deg,#d9f99d,#bef264); color:#365314; box-shadow:0 4px 10px rgba(132,204,22,.14); }
.info-block p { margin:0; color:#405067; line-height:1.75; }
.card-toggle {
  width:100%; border:none; cursor:pointer; background:#fff;
  padding:14px 16px; font-size:.98rem; font-weight:900; color:var(--pri);
  border-top:1px dashed #dfd5ff;
}
.hidden-area { display:none; }
.hidden-area.show { display:block; animation:fadeIn .28s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.section-hint {
  color:var(--sub); font-size:.95rem; line-height:1.8; margin:0 0 12px;
  background:linear-gradient(135deg, rgba(123,97,255,.08), rgba(255,95,148,.06));
  border:1px solid #e9defe; border-radius:16px; padding:12px 14px;
}
.section-hint .match-line { display:block; margin-top:4px; }
.section-hint .good-txt { color:#5b3df5; font-weight:900; }
.section-hint .gap-txt { color:#ff5f94; font-weight:900; }
.fold-title {
  font-size:1.15rem; font-weight:950; margin:18px 4px 12px;
}

.result-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
.tiny-note { margin-top:14px; font-size:.84rem; color:#8b95aa; line-height:1.7; text-align:center; }
.tip-list { display:grid; gap:8px; margin-top:12px; }
.tip-chip {
  border:1px solid var(--line); border-radius:16px; background:#fff; padding:10px 12px;
  color:#4b5a70; font-size:.93rem; line-height:1.7;
}
.result-subgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0 10px; }
.note-card { background:linear-gradient(180deg, rgba(237,242,255,.95), rgba(255,255,255,.98)); border:1px solid #d9e6ff; border-radius:20px; padding:14px 14px; box-shadow:0 10px 20px rgba(59,130,246,.06); }
.note-card b { display:inline-block; margin-bottom:8px; font-size:.96rem; padding:6px 10px; border-radius:12px; background:linear-gradient(135deg,#dbeafe,#bfdbfe); color:#1d4ed8; box-shadow:0 4px 10px rgba(59,130,246,.14); }
.note-card div { color:#405067; line-height:1.72; }
.save-loading { opacity:.7; pointer-events:none; }

@media (max-width:640px) {
  body { padding:10px; }
  .topbar { padding:20px 16px 8px; }
  .content { padding:14px 16px 20px; }
  .hero-title { font-size:2.35rem; max-width:9em; }
  .module-title { font-size:1.78rem; }
  .summary-grid { grid-template-columns:1fr; }
  .result-actions, .result-subgrid { grid-template-columns:1fr; }
  .scale { grid-template-columns:42px 1fr 42px; }
  .opts button { width:42px; height:42px; }
  .chart-wrap { height:260px; }
  .nav-row { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<div class="shell" id="captureArea">
  <div class="topbar">
    <div class="eyebrow"><div class="dot"></div><div>ToB销售行业适配度评估</div></div>
    <div class="hero-title">ToB销售行业<br>适配度评估</div>
    <p class="hero-sub">用于帮助你先做行业方向排序，再结合自身经历判断更适合切入哪类 ToB 赛道。适合手机分步作答，也方便结果截图保存。</p>
  </div>

  <div class="content">
    <section id="landingPage" class="page active">
      <div class="panel">
        <label class="field-label" for="userName">先输入一个称呼</label>
        <input id="userName" class="input" maxlength="14" placeholder="例如：韩主任 / 小李 / 转行选手">
        <div class="mini-note">题目按 6 个维度分步完成，答完会生成 14 个行业的匹配报告，并默认展开最推荐的 3 个行业。</div>
      </div>
      <button id="startBtn" class="primary-btn">正式开始</button>
    </section>

    <section id="quizPage" class="page">
      <div class="progress-wrap">
        <div class="progress-row">
          <strong id="progressLabel">作答进度</strong>
          <span id="progressText">0 / 36</span>
        </div>
        <div class="track"><div id="progressBar" class="bar"></div></div>
      </div>
      <div id="moduleHero" class="module-hero module-anim">
        <div class="module-kicker" id="moduleKicker">第 1 类 / 共 6 类</div>
        <div class="module-title" id="moduleTitle">成就驱动</div>
        <div class="module-sub" id="moduleSub"></div>
      </div>
      <form id="moduleForm"></form>
      <div class="nav-row">
        <button type="button" class="ghost-btn" id="prevBtn">上一类</button>
        <button type="button" class="primary-btn" id="nextBtn">下一类</button>
      </div>
    </section>

    <section id="resultPage" class="page"></section>
  </div>
</div>

<script>
const groups = [
  {
    "id": "drive",
    "title": "成就驱动",
    "subtitle": "看你是否愿意主动争取结果、承担目标压力，参考职业兴趣中的企业型倾向与成就追求。",
    "ref": "参考：RIASEC 企业型倾向 + 成就动机",
    "questions": [
      {
        "id": "D1",
        "text": "看到明确结果目标时，我通常会更想冲一把，而不是先退一步。",
        "reverse": false
      },
      {
        "id": "D2",
        "text": "当机会、客户或资源需要争取时，我更倾向主动出手，而不是等机会自己来。",
        "reverse": false
      },
      {
        "id": "D3",
        "text": "为了达成重要结果，我能接受阶段性的高投入和高压力。",
        "reverse": false
      },
      {
        "id": "D4",
        "text": "当一件事结果还没定下来时，我通常更愿意继续争取，而不是尽快抽身。",
        "reverse": false
      },
      {
        "id": "D5",
        "text": "遇到竞争场景时，我更容易产生行动欲，而不只是紧张感。",
        "reverse": false
      },
      {
        "id": "D6",
        "text": "只要工作稳定就好，是否做到更高结果对我来说并不重要。",
        "reverse": true
      }
    ]
  },
  {
    "id": "target",
    "title": "目标执行",
    "subtitle": "看你是否能把目标拆成步骤并持续推进，参考尽责性中的自律、持续性与执行控制。",
    "ref": "参考：Big Five 尽责性（自律 / 持续推进）",
    "questions": [
      {
        "id": "T1",
        "text": "接到任务后，我通常会先拆步骤、排节点，再真正开始推进。",
        "reverse": false
      },
      {
        "id": "T2",
        "text": "面对周期长、反馈慢的事情，我也能持续跟进，不太容易半途松掉。",
        "reverse": false
      },
      {
        "id": "T3",
        "text": "即使一开始反馈一般，我也会按计划继续推进，而不是很快放弃。",
        "reverse": false
      },
      {
        "id": "T4",
        "text": "我习惯把重要事情拆成阶段任务，而不是只盯着一个模糊的大目标。",
        "reverse": false
      },
      {
        "id": "T5",
        "text": "当目标已经定下，我通常会给自己明确的时间边界。",
        "reverse": false
      },
      {
        "id": "T6",
        "text": "只要方向差不多，过程是否持续推进、节点是否达成都没那么重要。",
        "reverse": true
      }
    ]
  },
  {
    "id": "analysis",
    "title": "分析学习",
    "subtitle": "看你是否愿意理解复杂逻辑、验证信息并持续学习，参考开放性中的求知、理解与抽象思考。",
    "ref": "参考：Big Five 开放性（求知 / 理解复杂性）",
    "questions": [
      {
        "id": "A1",
        "text": "接触一个陌生行业时，我愿意先花时间把它的业务逻辑搞明白。",
        "reverse": false
      },
      {
        "id": "A2",
        "text": "做重要判断前，我会先核实关键事实，而不是只靠直觉。",
        "reverse": false
      },
      {
        "id": "A3",
        "text": "面对复杂问题时，我愿意多看几个角度，而不只抓表面答案。",
        "reverse": false
      },
      {
        "id": "A4",
        "text": "如果一个产品或方案比较复杂，我通常有耐心把它研究明白。",
        "reverse": false
      },
      {
        "id": "A5",
        "text": "我乐于持续学习新概念、新工具或新行业知识。",
        "reverse": false
      },
      {
        "id": "A6",
        "text": "只要事情能先推进，底层逻辑其实没必要搞得太清楚。",
        "reverse": true
      }
    ]
  },
  {
    "id": "rigor",
    "title": "严谨审慎",
    "subtitle": "看你对细节、风险与错误的敏感度，参考尽责性中的有序性与审慎决策倾向。",
    "ref": "参考：Big Five 尽责性（有序 / 审慎）",
    "questions": [
      {
        "id": "R1",
        "text": "提交重要材料前，我通常会主动复查细节，尽量避免低级错误。",
        "reverse": false
      },
      {
        "id": "R2",
        "text": "做关键决策时，我更习惯先验证信息，再做判断。",
        "reverse": false
      },
      {
        "id": "R3",
        "text": "我会留意流程和细节，因为这些往往决定最终结果。",
        "reverse": false
      },
      {
        "id": "R4",
        "text": "面对重要事项时，我通常会提前预想风险点。",
        "reverse": false
      },
      {
        "id": "R5",
        "text": "即使时间紧，我也会尽量保留必要的核对步骤。",
        "reverse": false
      },
      {
        "id": "R6",
        "text": "只要大方向没问题，细节上的小错通常不用太在意。",
        "reverse": true
      }
    ]
  },
  {
    "id": "empathy",
    "title": "关系共情",
    "subtitle": "看你是否能感知他人需求、建立信任并维持长期关系，参考宜人性中的共情与合作倾向。",
    "ref": "参考：Big Five 宜人性（共情 / 合作）",
    "questions": [
      {
        "id": "E1",
        "text": "和人沟通时，我通常能比较快抓到对方真正关心的点。",
        "reverse": false
      },
      {
        "id": "E2",
        "text": "当对方表达顾虑时，我会先理解他的立场，再想怎么推进。",
        "reverse": false
      },
      {
        "id": "E3",
        "text": "我愿意花时间经营关系，而不是只在需要结果时才联系别人。",
        "reverse": false
      },
      {
        "id": "E4",
        "text": "在合作里，我会注意让对方感到被理解，而不只是把我的意思说清楚。",
        "reverse": false
      },
      {
        "id": "E5",
        "text": "我通常愿意倾听别人没有明说出来的担心和顾虑。",
        "reverse": false
      },

const totalQuestions = groups.reduce((sum,g)=>sum + g.questions.length, 0);
const DIM_LABELS = ['成就驱动','目标执行','分析学习','严谨审慎','关系共情','社交影响'];
const STORAGE_KEY = 'tob_sales_fit_eval_v4_answers';
let answers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentGroup = 0;
let radarCharts = {};

const landingPage = document.getElementById('landingPage');
const quizPage = document.getElementById('quizPage');
const resultPage = document.getElementById('resultPage');
const moduleForm = document.getElementById('moduleForm');
const moduleHero = document.getElementById('moduleHero');
const moduleKicker = document.getElementById('moduleKicker');
const moduleTitle = document.getElementById('moduleTitle');
const moduleSub = document.getElementById('moduleSub');
const progressText = document.getElementById('progressText');
const progressBar = document.getElementById('progressBar');

function showPage(id) {
  [landingPage, quizPage, resultPage].forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function answeredCount() {
  return groups.reduce((sum,g)=> sum + g.questions.filter(q => answers[q.id]).length, 0);
}

function updateProgress() {
  const count = answeredCount();
  progressText.textContent = `${count} / ${totalQuestions}`;
  progressBar.style.width = `${(count / totalQuestions) * 100}%`;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function renderModule(index) {
  currentGroup = index;
  const group = groups[index];
  moduleHero.classList.remove('module-anim');
  void moduleHero.offsetWidth;
  moduleHero.classList.add('module-anim');

  moduleKicker.textContent = `第 ${index + 1} 类 / 共 ${groups.length} 类`;
  moduleTitle.textContent = group.title;
  moduleSub.textContent = group.subtitle;

  moduleForm.innerHTML = group.questions.map((q, idx) => {
    const val = answers[q.id] || '';
    return `
      <div class="q-card" id="card_${q.id}">
        <div class="q-num">Q${String(idx + 1).padStart(2,'0')} · ${group.title}</div>
        <div class="q-text">${escapeHtml(q.text)}</div>
        <div class="scale">
          <span>不符合</span>
          <div class="opts">
            ${[1,2,3,4,5].map(n => `<button type="button" data-q="${q.id}" data-v="${n}" class="${String(val)===String(n)?'on':''}">${n}</button>`).join('')}
          </div>
          <span>很符合</span>
        </div>
      </div>
    `;
  }).join('');

  moduleForm.querySelectorAll('.opts button').forEach(btn => {
    btn.addEventListener('click', () => {
      const qid = btn.dataset.q;
      const val = Number(btn.dataset.v);
      answers[qid] = val;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
      document.querySelectorAll(`button[data-q="${qid}"]`).forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById(`card_${qid}`).style.borderColor = 'var(--line)';
      updateProgress();
    });
  });

  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').textContent = index === groups.length - 1 ? '查看结果' : '下一类';
  updateProgress();
}

function validateGroup(index) {
  const group = groups[index];
  const firstMiss = group.questions.find(q => !answers[q.id]);
  if (!firstMiss) return true;
  const card = document.getElementById(`card_${firstMiss.id}`);
  if (card) {
    card.style.borderColor = '#ff7d9f';
    card.scrollIntoView({behavior:'smooth', block:'center'});
  }
  alert('这一类还有题目没选完，先答完再继续。');
  return false;
}

function avg(ids) {
  let sum = 0;
  ids.forEach(id => {
    let v = Number(answers[id] || 0);
    const reverse = groups.some(g => g.questions.some(q => q.id===id && q.reverse));
    if (reverse && v) v = 6 - v;
    sum += v;
  });
  return Number((sum / ids.length).toFixed(2));
}

function getUserProfile() {
  return [
    avg(['D1','D2','D3','D4','D5','D6']),
    avg(['T1','T2','T3','T4','T5','T6']),
    avg(['A1','A2','A3','A4','A5','A6']),
    avg(['R1','R2','R3','R4','R5','R6']),
    avg(['E1','E2','E3','E4','E5','E6']),
    avg(['S1','S2','S3','S4','S5','S6']),
  ];
}

function getZone(score) {
  if (score >= 85) return {cls:'zone-good', txt:'高度匹配'};
  if (score >= 76) return {cls:'zone-blue', txt:'优势赛道'};
  if (score >= 66) return {cls:'zone-mid', txt:'可入局但需补短'};
  return {cls:'zone-warn', txt:'谨慎入局'};
}

function describeCore(ideal) {
  return ideal
    .map((v,i)=>({v,i}))
    .sort((a,b)=>b.v-a.v)
    .slice(0,3)
    .map(item=>DIM_LABELS[item.i])
    .join('、');
}

function describeGap(user, ideal) {
  return ideal
    .map((v,i)=>({gap: v - user[i], i}))
    .sort((a,b)=>b.gap-a.gap)
    .filter(x => x.gap > 0.45)
    .slice(0,2)
    .map(x => DIM_LABELS[x.i]);
}

function describeMatch(user, ideal) {
  const arr = ideal
    .map((v,i)=>({fit: user[i] - v, ideal:v, i}))
    .filter(x => x.fit >= -0.2 || (x.ideal >= 4 && x.fit >= -0.35))
    .sort((a,b)=>(b.ideal + b.fit) - (a.ideal + a.fit))
    .slice(0,3)
    .map(x => DIM_LABELS[x.i]);
  return arr;
}

function describeFitNote(user, ideal) {
  const good = describeMatch(user, ideal);
  const gap = describeGap(user, ideal);
  const goodText = good.length ? good.join('、') : '当前暂无特别突出的贴合维度';
  const gapText = gap.length ? gap.join('、') : '当前没有特别明显的短板';
  return `
    <span class="match-line">匹配点：<span class="good-txt">${goodText}</span></span>
    <span class="match-line">待补点：<span class="gap-txt">${gapText}</span></span>
  `;
}

      trans: '转入前优先补：产业链理解、价格谈判、高压环境稳定度。'
    }
  };
  return map[name] || { job: '适合先看：客户经理、销售工程师、区域销售等基础切入口。', trans: '转入前优先补：行业理解、表达能力和真实项目经验。' };
}

function getTopSummary(user, scored) {
  const topDims = user.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v).slice(0,3).map(x=>DIM_LABELS[x.i]);
  const lowDims = user.map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v).slice(0,2).map(x=>DIM_LABELS[x.i]);
  return { topDims, lowDims, first: scored[0] };
}

function scoreIndustry(user, ind) {
  let total = 0;
  let weightSum = 0;
  let criticalPenalty = 0;
  ind.ideal.forEach((idealVal, i) => {
    const userVal = user[i];
    const diff = idealVal - userVal;
    const weight = 1 + Math.max(0, idealVal - 3);
    let dimScore = 100 - (diff > 0 ? diff * 22 : Math.abs(diff) * 8);
    dimScore = Math.max(0, Math.min(100, dimScore));
    total += dimScore * weight;
    weightSum += weight;
    if (idealVal >= 4.5 && userVal < 3.4) {
      criticalPenalty += (3.4 - userVal) * 8;
    }
  });
  const score = Math.max(40, (total / weightSum) - criticalPenalty);
  return Number(score.toFixed(1));
}

function makeCard(ind, rank, user, expanded=false) {
  const score = ind.score;
  const zone = getZone(score);
  const gaps = describeGap(user, ind.ideal);
  const gapsText = gaps.length ? gaps.join('、') : '当前短板不明显，可优先验证行业兴趣和实际项目经验。';
  const advice = getIndustryAdvice(ind.name);
  const fitNote = describeFitNote(user, ind.ideal);
  return `
    <article class="result-card ${zone.cls}">
      <div class="zone-head">
        <div>
          <div style="color:var(--sub);font-weight:900;font-size:.92rem;">TOP ${rank}</div>
          <div class="zone-title">${ind.name}</div>
          <div class="big-score">${score} 分</div>
        </div>
        <div class="badge">${zone.txt}</div>
      </div>
      <div class="card-body">
        <div class="section-hint">核心更看重：<b>${describeCore(ind.ideal)}</b>${fitNote}</div>
        <div id="detail_${rank}" class="hidden-area ${expanded ? 'show' : ''}">
          <div class="chart-wrap"><canvas id="radar_${rank}"></canvas></div>
          <div class="result-subgrid">
            <div class="note-card"><b>适合先看岗位</b><div>${advice.job}</div></div>
            <div class="note-card"><b>切入建议</b><div>${advice.trans}</div></div>
          </div>
          <div class="info">
            <div class="info-block"><b>行业现状</b><p>${ind.status}</p></div>
            <div class="info-block"><b>薪酬水平</b><p>${ind.salary}</p></div>
            <div class="info-block"><b>晋升路径</b><p>${ind.growth}</p></div>
            <div class="info-block"><b>发展前景</b><p>${ind.prospect}</p></div>
            <div class="info-block"><b>入局挑战</b><p>${ind.challenge}</p></div>
            <div class="info-block"><b>优先补强</b><p>${gapsText}</p></div>
          </div>
        </div>
      </div>
      <button class="card-toggle" type="button" onclick="toggleCard('detail_${rank}', this)">
        ${expanded ? '收起详细解析' : '展开详细解析与六维对照图'}
      </button>
    </article>
  `;
}

function renderResults() {
  const userName = (document.getElementById('userName').value || '你').trim() || '你';
  const user = getUserProfile();
  const scored = industries.map(ind => ({...ind, score: scoreIndustry(user, ind)})).sort((a,b)=>b.score-a.score);
  const summary = getTopSummary(user, scored);

  resultPage.innerHTML = `
    <div class="result-head">
      <div class="result-name">${escapeHtml(userName)} 的测评结果</div>
      <div class="result-title">更适合优先尝试的 ToB 行业</div>
      <div class="top-industry">首推赛道：${scored[0].name}</div>
      <div class="summary-grid">
        <div class="stat-card"><div class="stat-label">最高匹配</div><div class="stat-value">${scored[0].score} 分</div></div>
        <div class="stat-card"><div class="stat-label">推荐区间</div><div class="stat-value">${getZone(scored[0].score).txt}</div></div>
        <div class="stat-card"><div class="stat-label">题目数量</div><div class="stat-value">${totalQuestions} 题</div></div>
      </div>
      <div class="tip-list">
        <div class="tip-chip"><b>你当前更突出的维度：</b>${summary.topDims.join('、')}</div>
        <div class="tip-chip"><b>优先留意的补强方向：</b>${summary.lowDims.join('、')}</div>
        <div class="tip-chip"><b>使用建议：</b>先看前 3 个行业，再结合过往经历、可进入岗位和真实市场机会做最终选择。</div>
      </div>
      <p class="section-hint" style="margin-top:12px;">说明：这是基于职业兴趣与人格维度构建的行业适配参考结果，用来帮助你做赛道优先级排序，不替代正式的人才测评或面试评估。</p>
    </div>

    <div class="fold-title">最推荐优先看的 3 个行业</div>
    ${scored.slice(0,3).map((ind,idx)=>makeCard(ind, idx+1, user, true)).join('')}
    <div class="fold-title">其余 11 个行业</div>
    ${scored.slice(3).map((ind,idx)=>makeCard(ind, idx+4, user, false)).join('')}
    <div class="result-actions">
      <button class="primary-btn" id="saveReportBtn" type="button" onclick="saveLongImage()">一键保存长图报告</button>
      <button class="ghost-btn" type="button" onclick="backToLanding()">重新测评</button>
    </div>
    <div class="tiny-note">测评结果仅供参考，最终选择请结合自身兴趣与市场机会</div>
  `;
  showPage('resultPage');

  scored.forEach((ind, idx) => renderRadar(`radar_${idx+1}`, user, ind.ideal));
}

function renderRadar(id, user, ideal) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (radarCharts[id]) radarCharts[id].destroy();
  radarCharts[id] = new Chart(canvas, {
    type:'radar',
    data:{
      labels:DIM_LABELS,
      datasets:[
        {
          label:'你的画像',
          data:user,
          borderColor:'#7b61ff',
          backgroundColor:'rgba(123,97,255,.16)',
          pointBackgroundColor:'#7b61ff',
          pointRadius:3,
          borderWidth:2
        },
        {
          label:'行业画像',
          data:ideal,
          borderColor:'#ff6c9a',
          backgroundColor:'rgba(255,108,154,.08)',
          pointBackgroundColor:'#ff6c9a',
          pointRadius:2.6,
          borderDash:[6,5],
          borderWidth:2
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{ position:'top', labels:{ boxWidth:12, usePointStyle:true, font:{size:11, weight:'700'} } }
      },
      scales:{
        r:{
          min:1, max:5,
          angleLines:{ color:'rgba(123,97,255,.13)' },
          grid:{ color:'rgba(123,97,255,.13)' },
          pointLabels:{ color:'#516079', font:{ size:11, weight:'700' } },
          ticks:{ stepSize:1, backdropColor:'transparent', color:'#8a94a8', showLabelBackdrop:false }
        }
      }
    }
  });
}

window.toggleCard = function(id, btn) {
  const box = document.getElementById(id);
  box.classList.toggle('show');
  btn.textContent = box.classList.contains('show') ? '收起详细解析' : '展开详细解析与六维对照图';
};

window.saveLongImage = async function() {
  const btn = document.getElementById('saveReportBtn');
  if (btn) {
    btn.classList.add('save-loading');
    btn.textContent = '正在生成长图...';
  }
  try {
    const node = document.getElementById('captureArea');
    const canvas = await html2canvas(node, {
      backgroundColor: '#f6f3ff',
      scale: Math.min(window.devicePixelRatio || 2, 2),
      useCORS: true,
      scrollX: 0,
      scrollY: -window.scrollY,
      windowWidth: document.documentElement.scrollWidth,
      windowHeight: document.documentElement.scrollHeight
    });
    const link = document.createElement('a');
    const userName = (document.getElementById('userName').value || 'ToB销售行业适配度评估').trim() || 'ToB销售行业适配度评估';
    link.download = `${userName}_ToB销售行业适配度评估.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('长图生成失败，请稍后重试。');
  } finally {
    if (btn) {
      btn.classList.remove('save-loading');
      btn.textContent = '一键保存长图报告';
    }
  }
};

window.backToLanding = function() {
  showPage('landingPage');
};

document.getElementById('startBtn').addEventListener('click', () => {
  showPage('quizPage');
  renderModule(0);
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentGroup > 0) renderModule(currentGroup - 1);
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (!validateGroup(currentGroup)) return;
  if (currentGroup < groups.length - 1) {
    renderModule(currentGroup + 1);
  } else {
    renderResults();
  }
});

// initialize progress for persisted answers
updateProgress();
</script>
