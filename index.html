<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ToB销售行业适配度评估</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
:root {
  --bg1:#f8f3ff;
  --bg2:#eef4ff;
  --ink:#182235;
  --sub:#69758a;
  --line:#eadff7;
  --card:rgba(255,255,255,.9);
  --white:#fff;
  --pri:#7b61ff;
  --pri2:#b56bff;
  --pink:#ff5f94;
  --soft:#f5f7ff;
  --good:#22c55e;
  --better:#3b82f6;
  --mid:#f59e0b;
  --warn:#fb7185;
  --shadow:0 18px 44px rgba(114,92,255,.13);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 0% 0%, rgba(255,255,255,.95), transparent 22%),
    radial-gradient(circle at 100% 0%, rgba(255,112,160,.16), transparent 18%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 58%, #fff8fb);
  min-height:100vh;
  padding:14px;
}

/* --- 密码门禁专属样式 --- */
.auth-overlay {
  position: fixed; inset: 0; z-index: 99999;
  background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.auth-card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 45px 30px; border-radius: 32px;
  box-shadow: 0 24px 50px rgba(0,0,0,0.15);
  text-align: center; width: 100%; max-width: 400px;
  border: 1px solid rgba(255,255,255,1);
}
.auth-icon {
  width: 54px; height: 54px; background: linear-gradient(135deg, var(--pri), var(--pink));
  color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(124,98,255,.3);
}
.auth-title { margin: 0 0 12px; color: #1e293b; font-size: 1.5rem; font-weight: 900; letter-spacing: 0.5px; }
.auth-desc { color: #64748b; font-size: 0.9rem; line-height: 1.7; margin-bottom: 24px; font-weight: 500;}
.auth-input {
  width: 100%; padding: 16px 20px; font-size: 1.1rem; border: 2px solid #e2e8f0; 
  border-radius: 16px; margin-bottom: 16px; text-align: center; outline: none; 
  font-weight: 800; color: #1e293b; transition: 0.3s; background: #f8fafc;
}
.auth-input:focus { border-color: var(--pri); background: #fff; box-shadow: 0 0 0 4px rgba(123,97,255,.1); }
.auth-btn {
  width: 100%; padding: 16px; background: linear-gradient(135deg, var(--pri), var(--pri2)); 
  color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 900; 
  cursor: pointer; box-shadow: 0 12px 24px rgba(123,97,255,.3); transition: 0.2s;
}
.auth-btn:active { transform: scale(0.98); }
.auth-error { color: #ef4444; font-size: 0.9rem; margin-top: 14px; font-weight: 700; display: none; }

/* --- 测评主体样式 --- */
.shell {
  max-width:760px;
  margin:0 auto;
  background:var(--card);
  border:1px solid rgba(255,255,255,.85);
  border-radius:28px;
  box-shadow:var(--shadow);
  overflow:visible;
  backdrop-filter:blur(18px);
}
.topbar {
  padding:26px 20px 8px;
  background:linear-gradient(180deg, rgba(255,255,255,.32), rgba(255,255,255,.1));
}
.eyebrow {
  display:flex; align-items:center; gap:12px;
  font-size:1.1rem; font-weight:800; color:#384457;
}
.dot {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,var(--pri),var(--pink));
  box-shadow:0 10px 20px rgba(124,98,255,.25);
}
.hero-title {
  margin:18px 0 10px;
  font-size:clamp(2.15rem, 6vw, 3.1rem);
  line-height:1.04; font-weight:950; letter-spacing:-1px;
  max-width:11em;
}
.hero-sub {
  margin:0;
  color:var(--sub);
  font-size:1rem;
  line-height:1.8;
}
.content { padding:18px 20px 24px; }
.page { display:none; }
.page.active { display:block; }
.panel {
  background:rgba(255,255,255,.76);
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px 16px;
  margin-bottom:14px;
  box-shadow:0 6px 18px rgba(122,92,255,.05);
}
.panel-title {
  font-size:1.4rem; font-weight:900; margin-bottom:8px;
}
.panel-sub {
  font-size:1rem; line-height:1.8; color:var(--sub); margin:0;
}
.field-label {
  display:block; font-size:1.05rem; font-weight:800; margin:6px 0 12px;
}
.input {
  width:100%; border:2px solid #ddd8ff; background:#fff;
  border-radius:20px; height:58px; font-size:1.12rem; padding:0 18px;
  outline:none; color:var(--ink); font-weight:700;
  transition:.2s;
}
.input:focus {
  border-color:var(--pri);
  box-shadow:0 0 0 6px rgba(123,97,255,.12);
}
.primary-btn,.ghost-btn {
  width:100%; border:none; border-radius:999px; height:58px;
  font-size:1.18rem; font-weight:900; cursor:pointer;
  transition:.22s ease;
}
.primary-btn {
  color:#fff;
  background:linear-gradient(90deg,var(--pri),var(--pink));
  box-shadow:0 16px 26px rgba(255,95,148,.23);
}
.primary-btn:active,.ghost-btn:active { transform:scale(.99); }
.ghost-btn {
  background:#fff; color:var(--pri); border:2px solid #e1d8ff;
}
.mini-note {
  margin-top:12px; font-size:.9rem; color:#8793a8; line-height:1.7;
}
.quiz-sticky {
  position:sticky; top:0; z-index:30;
  padding-top:4px; margin-bottom:10px;
  background:linear-gradient(180deg, rgba(248,243,255,.96), rgba(248,243,255,.88) 78%, rgba(248,243,255,0));
  backdrop-filter:blur(10px);
}
.progress-wrap {
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  margin-bottom:4px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 20px rgba(123,97,255,.08);
}
.progress-row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
.progress-row strong { font-size:1rem; }
.progress-row span { color:var(--sub); font-weight:800; }
.track {
  height:10px; background:#efe9ff; border-radius:999px; overflow:hidden;
}
.bar {
  width:0%; height:100%;
  background:linear-gradient(90deg,var(--pri),var(--pink));
  border-radius:999px; transition:width .25s ease;
}
.module-hero {
  padding:12px 6px 8px;
  text-align:left;
}
.module-kicker {
  font-size:.92rem; color:var(--pri); font-weight:900; letter-spacing:.5px;
}
.module-title {
  margin:10px 0 8px; font-size:2.05rem; font-weight:950; line-height:1.08;
}
.module-sub {
  color:var(--sub); line-height:1.8; font-size:.98rem;
}
.module-anim {
  animation:moduleIn .45s cubic-bezier(.22,.85,.2,1);
  transform-origin:left center;
}
@keyframes moduleIn {
  from { opacity:0; transform:translateY(14px) scale(.98); filter:blur(5px); }
  to { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}
.q-card {
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px 16px;
  margin-bottom:14px;
  box-shadow:0 8px 22px rgba(123,97,255,.05);
}
.q-num {
  color:var(--pri); font-size:1rem; font-weight:900; margin-bottom:10px;
}
.q-text {
  font-size:1.08rem; line-height:1.7; font-weight:900; margin-bottom:16px;
}
.scale {
  display:flex; flex-direction:column; gap:12px;
}
.scale-top {
  display:grid; grid-template-columns:48px minmax(0,1fr) 48px; align-items:center; gap:8px;
}
.scale-top span {
  color:#7b879b; font-size:.82rem; font-weight:900; line-height:1.15;
  white-space:normal; word-break:keep-all; text-align:center;
}
.opts {
  display:flex; justify-content:center; gap:8px; flex-wrap:nowrap; min-width:0;
}
.opts button {
  width:46px; height:46px; border-radius:50%;
  border:none; background:#f3f4fb; color:#596579;
  font-size:1.08rem; font-weight:900; cursor:pointer; transition:.18s ease;
}
.opts button.on {
  color:#fff; transform:translateY(-2px) scale(1.05);
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  box-shadow:0 12px 18px rgba(123,97,255,.28);
}
.nav-row {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;
}
.result-head {
  background:linear-gradient(135deg, rgba(123,97,255,.12), rgba(255,95,148,.09));
  border:1px solid var(--line);
  border-radius:26px; padding:20px 18px; margin-bottom:16px;
}
.result-name { display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; font-size:1.08rem; color:#4338ca; font-weight:950; background:linear-gradient(135deg,#ffffff,#f5f3ff); border:1px solid #d9d6fe; box-shadow:0 10px 24px rgba(123,97,255,.10); }
.result-name .name-strong { color:#1f2a44; font-size:1.16rem; }
.result-name .sep-dot { color:#7c3aed; }
.result-title { font-size:2rem; font-weight:950; line-height:1.1; margin:8px 0 0; }
.top-industry {
  display:inline-flex; align-items:center; gap:8px;
  margin-top:12px; background:#fff; border:1px solid #ebe4ff;
  border-radius:999px; padding:10px 14px; font-weight:900;
}
.summary-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:14px 0 18px;
}
.stat-card {
  background:#fff; border:1px solid var(--line); border-radius:20px; padding:14px 12px;
}
.stat-label { color:var(--sub); font-size:.9rem; font-weight:800; margin-bottom:6px; }
.stat-value { font-size:1.36rem; font-weight:950; }
.result-card {
  border-radius:26px; border:2px solid; overflow:hidden; margin-bottom:14px;
  box-shadow:0 10px 26px rgba(0,0,0,.04);
  background:#fff;
}
.zone-head {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:16px 16px 14px;
}
.zone-title { font-size:1.32rem; font-weight:950; }
.badge {
  white-space:nowrap; border-radius:999px; padding:8px 12px; font-size:.88rem; font-weight:900;
  background:#fff; box-shadow:0 6px 14px rgba(0,0,0,.05);
}
.zone-good { border-color:#98e5b4; background:linear-gradient(180deg, rgba(220,252,231,.88), rgba(255,255,255,.98) 46%); }
.zone-good .badge { color:var(--good); }
.zone-blue { border-color:#a9d0ff; background:linear-gradient(180deg, rgba(219,234,254,.92), rgba(255,255,255,.98) 46%); }
.zone-blue .badge { color:var(--better); }
.zone-mid { border-color:#ffd58a; background:linear-gradient(180deg, rgba(255,248,220,.95), rgba(255,255,255,.98) 46%); }
.zone-mid .badge { color:var(--mid); }
.zone-warn { border-color:#ffc0cf; background:linear-gradient(180deg, rgba(255,228,235,.95), rgba(255,255,255,.98) 46%); }
.zone-warn .badge { color:var(--warn); }
.card-body { padding:0 16px 16px; }
.big-score { font-size:2rem; font-weight:950; margin:4px 0 0; }
.chart-wrap {
  position:relative; height:280px; border:1px dashed #ddd8ff; border-radius:22px;
  background:linear-gradient(180deg,#fff, #faf8ff); padding:12px; margin:14px 0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
.chart-wrap::before {
  content:''; position:absolute; inset:0; pointer-events:none; border-radius:22px;
  background:linear-gradient(135deg, rgba(123,97,255,.05), rgba(255,95,148,.03) 40%, transparent 75%);
}
.info {
  margin-top:12px; display:grid; gap:10px;
}
.info-block {
  border:1px solid var(--line); border-radius:20px; padding:14px 14px 13px; background:linear-gradient(180deg,#ffffff, #fbf9ff);
  box-shadow:0 8px 18px rgba(123,97,255,.04);
}
.info-block b { display:inline-block; margin-bottom:8px; font-size:.96rem; padding:6px 10px; border-radius:12px; background:linear-gradient(135deg,#d9f99d,#bef264); color:#365314; box-shadow:0 4px 10px rgba(132,204,22,.14); }
.info-block p { margin:0; color:#405067; line-height:1.75; }
.card-toggle {
  width:100%; border:none; cursor:pointer; background:#fff;
  padding:14px 16px; font-size:.98rem; font-weight:900; color:var(--pri);
  border-top:1px dashed #dfd5ff;
}
.hidden-area { display:none; }
.hidden-area.show { display:block; animation:fadeIn .28s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.section-hint {
  color:var(--sub); font-size:.95rem; line-height:1.8; margin:0 0 12px;
  background:linear-gradient(135deg, rgba(123,97,255,.08), rgba(255,95,148,.06));
  border:1px solid #e9defe; border-radius:16px; padding:12px 14px; word-break:break-word; overflow-wrap:anywhere;
}
.section-hint .match-line { display:block; margin-top:4px; }
.section-hint .good-txt { color:#4263d6; font-weight:900; background:rgba(66,99,214,.10); padding:2px 8px; border-radius:10px; }
.section-hint .gap-txt { color:#d66aa0; font-weight:900; background:rgba(214,106,160,.12); padding:2px 8px; border-radius:10px; }
.fold-title {
  font-size:1.15rem; font-weight:950; margin:18px 4px 12px;
}

.result-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
.tiny-note { margin:14px auto 0; max-width:28em; padding:12px 14px; font-size:.86rem; color:#7b879b; line-height:1.8; text-align:center; background:rgba(255,255,255,.8); border:1px solid var(--line); border-radius:16px; }

.report-basis {
  margin-top:18px;
  padding:0 2px;
  border:none;
  background:transparent;
  color:#8f98a8;
  line-height:1.9;
  font-size:.84rem;
}
.report-basis b { color:#6f7b8f; font-weight:900; }
.report-basis .basis-tag {
  display:block; margin-bottom:8px;
  font-size:.84rem; font-weight:900; color:#7f8aa0;
}
.nowrap { white-space:nowrap; }
.export-snapshot { max-width:1180px; }
.export-snapshot .result-actions, .export-snapshot .fold-title.other-group, .export-snapshot .other-group-wrap, .export-snapshot .tiny-note, .export-snapshot .report-basis { display:none !important; }

.tip-list { display:grid; gap:10px; margin-top:14px; }
.tip-chip {
  border:1px solid var(--line); border-radius:18px; background:#fff; padding:12px 14px;
  color:#405067; font-size:.95rem; line-height:1.75; box-shadow:0 8px 18px rgba(123,97,255,.05);
}
.tip-chip .tip-key { display:inline-block; margin-right:8px; padding:7px 10px; border-radius:12px; font-weight:950; }
.tip-chip.tip-strong { background:linear-gradient(180deg,#f2f7ff,#ffffff); border-color:#c7dafc; }
.tip-chip.tip-strong .tip-key { background:linear-gradient(135deg,#e7efff,#dbe7ff); color:#4b61c8; }
.tip-chip.tip-gap { background:linear-gradient(180deg,#fff7fb,#ffffff); border-color:#f0d7e6; }
.tip-chip.tip-gap .tip-key { background:linear-gradient(135deg,#fde8f1,#f8ddea); color:#c16292; }
.tip-chip.tip-suggest { background:linear-gradient(180deg,#f8f7ff,#ffffff); border-color:#ddd8ff; }
.tip-chip.tip-suggest .tip-key { background:linear-gradient(135deg,#ece8ff,#e1dbff); color:#6752c7; }
.result-subgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0 10px; }
.focus-value{font-weight:950;}
.focus-blue{color:#4b61c8;background:rgba(75,97,200,.08);padding:2px 8px;border-radius:10px;}
.focus-pink{color:#c16292;background:rgba(193,98,146,.10);padding:2px 8px;border-radius:10px;}
.focus-violet{color:#6752c7;background:rgba(103,82,199,.08);padding:2px 8px;border-radius:10px;}

.note-card { background:linear-gradient(180deg, rgba(237,242,255,.95), rgba(255,255,255,.98)); border:1px solid #d9e6ff; border-radius:20px; padding:14px 14px; box-shadow:0 10px 20px rgba(59,130,246,.06); }
.note-card b { display:inline-block; margin-bottom:8px; font-size:.96rem; padding:6px 10px; border-radius:12px; background:linear-gradient(135deg,#dbeafe,#bfdbfe); color:#1d4ed8; box-shadow:0 4px 10px rgba(59,130,246,.14); }
.note-card div { color:#405067; line-height:1.72; }

.user-model-card {
  margin:14px 0 16px; border:1px solid #ddd8ff; border-radius:22px; padding:14px;
  background:linear-gradient(180deg,#fff, #faf8ff); box-shadow:0 10px 20px rgba(123,97,255,.05);
}
.user-model-title { font-size:1rem; font-weight:950; color:#312e81; margin-bottom:10px; }
.user-model-grid { display:grid; grid-template-columns:1fr; gap:14px; align-items:start; }
.user-chart-box { position:relative; height:360px; border:1px dashed #ddd8ff; border-radius:18px; padding:10px; background:linear-gradient(135deg, rgba(123,97,255,.05), rgba(255,95,148,.03)); overflow:hidden; }

.save-loading { opacity:.7; pointer-events:none; }

.subpage-head {
  padding:10px 4px 14px;
  margin-bottom:10px;
}
.back-pill {
  display:inline-flex; align-items:center; gap:6px;
  border:none; background:rgba(255,255,255,.96); color:var(--pri);
  border:1px solid #e1d8ff; border-radius:999px;
  padding:10px 14px; font-size:.95rem; font-weight:900; cursor:pointer;
  box-shadow:0 8px 18px rgba(123,97,255,.10);
}
.subpage-floating-back {
  position:sticky; top:12px; z-index:60; margin-bottom:14px;
  pointer-events:none;
}
.subpage-floating-back .back-pill {
  pointer-events:auto;
}
.subpage-title {
  margin:14px 0 6px; font-size:1.85rem; font-weight:950; line-height:1.15;
}
.subpage-sub {
  color:var(--sub); font-size:.96rem; line-height:1.8;
}
.result-mini-grid {
  display:grid; gap:12px; margin-top:14px;
}
.result-mini-card {
  background:#fff; border:1px solid var(--line); border-radius:22px;
  padding:16px 16px 14px; box-shadow:0 8px 18px rgba(123,97,255,.05);
}
.result-mini-top {
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
}
.result-mini-rank {
  color:var(--sub); font-size:.9rem; font-weight:900; margin-bottom:4px;
}
.result-mini-title {
  font-size:1.25rem; font-weight:950; line-height:1.2;
}
.result-mini-score {
  font-size:1.65rem; font-weight:950; white-space:nowrap;
}
.result-mini-actions {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;
}
.list-panel {
  background:#fff; border:1px solid var(--line); border-radius:24px;
  padding:14px; box-shadow:0 8px 18px rgba(123,97,255,.05);
}
.industry-list {
  display:grid; gap:10px;
}
.industry-row-btn {
  width:100%; border:none; background:linear-gradient(180deg,#fff,#fcfbff);
  border:1px solid var(--line); border-radius:18px; padding:14px 14px;
  text-align:left; cursor:pointer; box-shadow:0 6px 14px rgba(123,97,255,.04);
}
.industry-row-top {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.industry-row-title {
  font-size:1.05rem; font-weight:900; color:var(--ink);
}
.industry-row-score {
  font-size:1.15rem; font-weight:950; color:var(--pri);
  white-space:nowrap;
}
.industry-row-sub {
  display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap;
  color:var(--sub); font-size:.88rem; font-weight:800;
}
.inline-chip {
  display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px;
  background:#f5f3ff; color:#5b52c8; font-size:.84rem; font-weight:900;
  border:1px solid #e4ddff;
}
.compare-card {
  background:#fff; border:1px solid var(--line); border-radius:24px;
  padding:16px; box-shadow:0 8px 18px rgba(123,97,255,.05);
}
.compare-chart-box {
  position:relative; height:320px; border:1px dashed #ddd8ff; border-radius:18px;
  background:linear-gradient(180deg,#fff,#faf8ff); padding:10px; margin:12px 0 14px;
}
.compare-grid {
  display:grid; gap:10px;
}
@media (max-width:640px) {
  .subpage-title { font-size:1.6rem; }
  .result-mini-actions { grid-template-columns:1fr; }
  .compare-chart-box { height:280px; }
}


.meta-row { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 4px; }
.meta-chip { display:inline-flex; align-items:center; padding:7px 11px; border-radius:999px; font-size:.82rem; font-weight:900; border:1px solid #ddd8ff; background:#fff; color:#5a5f80; }
.meta-chip.primary { background:linear-gradient(135deg,#eef2ff,#fdf2f8); color:#5b4bc7; border-color:#dcd6ff; }
.company-box { margin: 12px 0 10px; }

function avg(ids) {
  let sum = 0;
  ids.forEach(id => {
    let v = Number(answers[id] || 0);
    const reverse = groups.some(g => g.questions.some(q => q.id===id && q.reverse));
    if (reverse && v) v = 6 - v;
    sum += v;
  });
  return Number((sum / ids.length).toFixed(2));
}

}

function describeCore(ideal) {
  return ideal
    .map((v,i)=>({v,i}))
    .sort((a,b)=>b.v-a.v)
    .slice(0,3)
    .map(item=>DIM_LABELS[item.i])
    .join('、');
}

function describeMatch(user, ideal) {
  const arr = ideal
    .map((v,i)=>({fit: user[i] - v, ideal:v, i}))
    .sort((a,b)=> b.fit - a.fit) 
    .slice(0, 2)
    .map(x => DIM_LABELS[x.i]);
  return arr;
}

function describeGap(user, ideal) {
  return ideal
    .map((v,i)=>({gap: v - user[i], i}))
    .sort((a,b)=> b.gap - a.gap)
    .filter(x => x.gap > 0.3)    
    .slice(0, 2)
    .map(x => DIM_LABELS[x.i]);
}

function describeFitNote(user, ideal) {
  const good = describeMatch(user, ideal);
  const gap = describeGap(user, ideal);
  const goodText = good.join('、');
  const gapText = gap.length ? gap.join('、') : '无明显短板';
  return `
    <span class="match-line">相对优势：<span class="good-txt">${goodText}</span></span>
    <span class="match-line">需补强点：<span class="gap-txt">${gapText}</span></span>
  `;
}

  const lowDims = user.map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v).slice(0,2).map(x=>DIM_LABELS[x.i]);
  return { topDims, lowDims, first: scored[0] };
}

function scoreIndustry(user, ind) {
  let total = 0;
  let weightSum = 0;
  let criticalPenalty = 0;
  ind.ideal.forEach((idealVal, i) => {
    const userVal = user[i];
    const diff = idealVal - userVal;
    const weight = 1 + Math.max(0, idealVal - 3);
    let dimScore = 100 - (diff > 0 ? diff * 22 : Math.abs(diff) * 8);
    dimScore = Math.max(0, Math.min(100, dimScore));
    total += dimScore * weight;
    weightSum += weight;
    if (idealVal >= 4.5 && userVal < 3.4) {
      criticalPenalty += (3.4 - userVal) * 8;
    }
  });
  const score = Math.max(40, (total / weightSum) - criticalPenalty);
  return Number(score.toFixed(1));
}


function computeScoredIndustries(user) {
  const rawScores = industries.map(ind => ({ind, raw: scoreIndustry(user, ind)}));
  let maxRaw = Math.max(...rawScores.map(d => d.raw));
  let minRaw = Math.min(...rawScores.map(d => d.raw));
  let range = maxRaw - minRaw;
  if (range === 0) range = 1;

  const driveScore = user[0];
  const topTarget = 83 + (driveScore * 2.8);
  const bottomTarget = 50 + (driveScore * 3);

  return rawScores.map(d => {
    let normalized = (d.raw - minRaw) / range;
    let tieBreaker = d.ind.name.length * 0.001;
    let finalScore = bottomTarget + normalized * (topTarget - bottomTarget) + tieBreaker;
    return { ...d.ind, score: Number(finalScore.toFixed(1)) };
  }).sort((a,b)=>b.score-a.score);
}

function renderUserRadar(id, user) {

  if (radarCharts[id]) radarCharts[id].destroy();

  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, 'rgba(123,97,255,0.45)');
  gradient.addColorStop(1, 'rgba(255,95,148,0.15)');

  const labelsWithScores = DIM_LABELS.map((label, i) => [label, `${user[i].toFixed(1)} 分`]);

  radarCharts[id] = new Chart(canvas, {
    type:'radar',
    data:{
      labels: labelsWithScores,
      datasets:[{
        label:'你的六维模型',
        data:user,
        fill:true,
        backgroundColor: gradient,
        borderColor:'#7b61ff',
        borderWidth: 2.5,
        pointBackgroundColor:'#fff',
        pointBorderColor:'#7b61ff',
        pointBorderWidth: 2,
        pointRadius: 4
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ 
        r:{ 
          min:0, max:5, 
          ticks:{ stepSize:1, backdropColor:'transparent', color:'#a0aec0', font:{size:10} }, 
          grid:{ color:'rgba(123,97,255,.2)', lineWidth: 1.2 }, 
          angleLines:{ color:'rgba(123,97,255,.2)', lineWidth: 1.2 }, 
          pointLabels:{ color:'#1e293b', font:{ size:13, weight:'800' }, padding: 12 }

      }
    }
  });
}

window.toggleCard = function(id, btn) {
  const box = document.getElementById(id);
  const card = btn.closest('.result-card');
  const wasOpen = box.classList.contains('show');

  if (wasOpen) {
    const currentTop = card.getBoundingClientRect().top + window.scrollY;
    box.classList.remove('show');
    btn.textContent = '展开详细解析与六维对照图';
    requestAnimationFrame(() => {
      const sticky = document.querySelector('.sticky-progress-wrap');
      const stickyH = sticky ? sticky.offsetHeight : 0;
      window.scrollTo({
        top: Math.max(currentTop - stickyH - 12, 0),
        behavior: 'smooth'
      });
    });
  } else {
    box.classList.add('show');
    btn.textContent = '收起详细解析';
  }
};

window.saveLongImage = async function() {
  const btn = document.getElementById('saveReportBtn');
  if (btn) {
    btn.classList.add('save-loading');
    btn.textContent = '正在生成长图...';
  }
  const exportId = 'exportSnapshotTemp';
  try {
    const user = getUserProfile();
    const rawScores = industries.map(ind => ({ind, raw: scoreIndustry(user, ind)}));
    let maxRaw = Math.max(...rawScores.map(d => d.raw));
    let minRaw = Math.min(...rawScores.map(d => d.raw));
    let range = maxRaw - minRaw;
    if(range === 0) range = 1;
    const driveScore = user[0];
    const topTarget = 83 + (driveScore * 2.8); 
    const bottomTarget = 50 + (driveScore * 3);
    const scored = rawScores.map(d => {
      let normalized = (d.raw - minRaw) / range;
      let tieBreaker = d.ind.name.length * 0.001; 
      let finalScore = bottomTarget + normalized * (topTarget - bottomTarget) + tieBreaker;
      return { ...d.ind, score: Number(finalScore.toFixed(1)) };
    }).sort((a,b)=>b.score-a.score);
    const summary = getTopSummary(user, scored);
    const userName = getCurrentUserName();

    const temp = document.createElement('div');
    temp.id = exportId;
    temp.className = 'container export-snapshot';
    temp.style.position = 'fixed';
    temp.style.left = '-10000px';
    temp.style.top = '0';
    temp.style.zIndex = '-1';
    temp.style.width = Math.min(document.documentElement.clientWidth || 1180, 1180) + 'px';
    temp.innerHTML = `
      <div class="result-head">
        <div class="result-name">👤 <span class="name-strong">${escapeHtml(userName)}</span><span class="sep-dot">•</span><span>测评结果</span></div>
        <div class="result-title">更适合优先尝试的 ToB 行业</div>
        <div class="top-industry">首推赛道：${scored[0].name}</div>
        <div class="summary-grid">
          <div class="stat-card"><div class="stat-label">最高匹配</div><div class="stat-value">${scored[0].score} 分</div></div>
          <div class="stat-card"><div class="stat-label">推荐区间</div><div class="stat-value">${getZone(scored[0].score).txt}</div></div>
          <div class="stat-card"><div class="stat-label">题目数量</div><div class="stat-value">${totalQuestions} 题</div></div>
        </div>
        <div class="user-model-card">
          <div class="user-model-title">你的六维模型结果</div>
          <div class="user-model-grid">
            <div class="user-chart-box" style="height:360px;"><canvas id="exportUserRadar"></canvas></div>
          </div>
        </div>
        <div class="tip-list">
          <div class="tip-chip tip-strong"><span class="tip-key">突出维度</span><span class="focus-value focus-blue">${summary.topDims.join('、')}</span></div>
          <div class="tip-chip tip-gap"><span class="tip-key">补强方向</span><span class="focus-value focus-pink">${summary.lowDims.join('、')}</span></div>
          <div class="tip-chip tip-suggest"><span class="tip-key">使用建议</span><span class="focus-value focus-violet">先看前 3 个行业，再结合过往经历、可进入岗位和真实市场机会做最终选择。</span></div>
        </div>
        <div class="report-basis">
          <div class="basis-tag">测评依据与结果说明</div>
          <div><b>依据来源：</b>本报告参考职业兴趣中的企业型倾向（RIASEC-Enterprising）、人格维度中的外向性、宜人性、尽责性、开放性与情绪稳定性，并结合 ToB 销售常见能力要求，构建六维行业适配模型。</div>
          <div><b>结果含义：</b>结果用于帮助你做 ToB 行业方向的优先级排序与入局判断，适合做第一轮筛选、交流展示与职业讨论参考。</div>
          <div><b>准确性说明：</b>这是基于结构化题项的行业适配评估，不替代正式的人才测评、招聘判断或临床诊断；若结合你的过往经历、目标岗位与市场机会一起看，参考价值会更高。</div>
        </div>
      </div>
      <div class="fold-title">最推荐优先看的 3 个行业</div>
      ${scored.slice(0,3).map((ind,idx)=>makeTop3Card(ind, idx+1, user)).join('')}
    `;
    document.body.appendChild(temp);
    renderUserRadar('exportUserRadar', user);
    await new Promise(r=>setTimeout(r, 180));
    const canvas = await html2canvas(temp, {
      backgroundColor: '#f6f3ff',
      scale: Math.min(window.devicePixelRatio || 2, 2),
      useCORS: true,
      scrollX: 0,
      scrollY: 0,
      windowWidth: temp.scrollWidth,
      windowHeight: temp.scrollHeight
    });
    const link = document.createElement('a');
    link.download = `${userName}_ToB销售行业适配度评估.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    temp.remove();
  } catch (e) {
    const temp = document.getElementById(exportId); if (temp) temp.remove();
    alert('长图生成失败，请稍后重试。');
  } finally {
    if (btn) {
      btn.classList.remove('save-loading');
      btn.textContent = '一键保存长图报告';
    }
  }
};

  currentIndustryName = '';
  updateProgress();
  moduleForm.innerHTML = '';

document.getElementById('startBtn').addEventListener('click', () => {
  const enteredName = (document.getElementById('userName').value || '').trim();
  if (enteredName) persistUserName(enteredName);
  if (answeredCount() >= totalQuestions) {
    renderResults();
    return;
  }
  showPage('quizPage');
  renderModule(getFirstIncompleteGroupIndex());
  scrollViewportTop();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentGroup > 0) renderModule(currentGroup - 1);
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (!validateGroup(currentGroup)) return;
  if (currentGroup < groups.length - 1) {
    renderModule(currentGroup + 1);
  } else {
    renderResults();
  }
});

// initialize progress for persisted answers
updateProgress();
const storedName = getStoredUserName();
if (storedName) {
  const input = document.getElementById('userName');
  if (input) input.value = storedName;
}
if (answeredCount() >= totalQuestions && totalQuestions > 0) {
  renderResults();
}
